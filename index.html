<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soflare - Rule Breaker Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(-45deg, #1a1a2e, #16213e, #0f3460, #1a1a2e);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
        }

        .header h1 {
            font-size: 2.5em;
            color: #e0e0e0;
            margin-bottom: 5px;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .header-subtitle {
            font-size: 1em;
            color: #999;
        }

        /* Form Section */
        .form-section {
            background: rgba(30, 40, 60, 0.7);
            border: 1px solid rgba(150, 150, 200, 0.3);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 30px;
        }

        .form-title {
            color: #e0e0e0;
            font-size: 1.1em;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .form-group {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 10px;
            margin-bottom: 10px;
        }

        @media (max-width: 768px) {
            .form-group {
                grid-template-columns: 1fr;
            }
        }

        .input-field {
            background: rgba(20, 30, 50, 0.8);
            border: 1px solid rgba(150, 150, 200, 0.4);
            border-radius: 6px;
            padding: 10px 12px;
            color: #e0e0e0;
            font-size: 0.95em;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            outline: none;
            border-color: rgba(150, 150, 200, 0.7);
            background: rgba(20, 30, 50, 0.95);
        }

        .input-field::placeholder {
            color: rgba(150, 150, 200, 0.5);
        }

        .btn {
            background: rgba(100, 150, 200, 0.8);
            border: 1px solid rgba(150, 150, 200, 0.5);
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            color: #e0e0e0;
            transition: all 0.2s ease;
            font-size: 0.95em;
        }

        .btn:hover {
            background: rgba(100, 150, 200, 1);
            border-color: rgba(150, 150, 200, 0.8);
        }

        /* Members Section */
        .members-section {
            margin-top: 30px;
        }

        .section-title {
            color: #e0e0e0;
            font-size: 1.1em;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .members-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 15px;
        }

        /* Member Card */
        .member-card {
            background: rgba(30, 40, 60, 0.7);
            border: 1px solid rgba(150, 150, 200, 0.3);
            border-radius: 8px;
            padding: 18px;
            transition: all 0.2s ease;
        }

        .member-card:hover {
            border-color: rgba(150, 150, 200, 0.6);
            background: rgba(30, 40, 60, 0.9);
        }

        .member-name {
            color: #e0e0e0;
            font-size: 1.3em;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .strike-display {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .strike-count {
            font-size: 2em;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 6px;
            min-width: 70px;
            text-align: center;
        }

        .strike-count.level-0 {
            background: rgba(100, 200, 100, 0.3);
            color: #90ee90;
        }

        .strike-count.level-1 {
            background: rgba(200, 200, 200, 0.3);
            color: #d0d0d0;
        }

        .strike-count.level-2 {
            background: rgba(255, 120, 100, 0.3);
            color: #ff8070;
        }

        .strike-count.level-3 {
            background: rgba(180, 50, 50, 0.3);
            color: #ff6b6b;
        }

        .strike-count.level-4 {
            background: rgba(0, 0, 0, 0.5);
            color: #fff;
            border: 2px solid rgba(200, 200, 200, 0.5);
        }

        .strike-label {
            color: #999;
            font-size: 0.9em;
        }

        /* Status */
        .status {
            padding: 8px 12px;
            border-radius: 6px;
            text-align: center;
            font-weight: 600;
            margin-bottom: 12px;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status.safe {
            background: rgba(100, 200, 100, 0.2);
            color: #90ee90;
            border: 1px solid rgba(100, 200, 100, 0.4);
        }

        .status.warning {
            background: rgba(255, 180, 80, 0.2);
            color: #ffb050;
            border: 1px solid rgba(255, 180, 80, 0.4);
        }

        .status.danger {
            background: rgba(255, 100, 100, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(255, 100, 100, 0.4);
        }

        .status.voting {
            background: rgba(200, 150, 80, 0.2);
            color: #ffb050;
            border: 1px solid rgba(200, 150, 80, 0.4);
        }

        .status.mercy {
            background: rgba(150, 100, 200, 0.2);
            color: #da70d6;
            border: 1px solid rgba(150, 100, 200, 0.4);
        }

        .status.banished {
            background: rgba(200, 50, 50, 0.2);
            color: #ff6b6b;
            border: 1px solid rgba(200, 50, 50, 0.4);
        }

        .rules-broken {
            color: #b0b0b0;
            font-size: 0.85em;
            margin-bottom: 12px;
            max-height: 60px;
            overflow-y: auto;
        }

        .rule-item {
            background: rgba(150, 150, 200, 0.15);
            padding: 5px 10px;
            border-radius: 4px;
            margin: 4px 0;
            border-left: 2px solid rgba(150, 150, 200, 0.5);
        }

        /* Penalty Toggle */
        .penalty-toggle {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .toggle-btn {
            flex: 1;
            padding: 8px 10px;
            border: 1px solid rgba(150, 150, 200, 0.4);
            background: rgba(50, 70, 100, 0.5);
            color: #b0b0b0;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8em;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .toggle-btn.active {
            background: rgba(100, 150, 200, 0.8);
            color: #e0e0e0;
            border-color: rgba(150, 150, 200, 0.7);
        }

        .toggle-btn:hover {
            border-color: rgba(150, 150, 200, 0.6);
        }

        /* Card Actions */
        .card-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .btn-small {
            flex: 1;
            background: rgba(50, 70, 100, 0.6);
            border: 1px solid rgba(150, 150, 200, 0.3);
            color: #b0b0b0;
            padding: 8px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8em;
            transition: all 0.2s ease;
        }

        .btn-small:hover {
            background: rgba(100, 150, 200, 0.6);
            border-color: rgba(150, 150, 200, 0.6);
            color: #e0e0e0;
        }

        .btn-small:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-delete {
            background: rgba(150, 50, 50, 0.4);
            border-color: rgba(200, 100, 100, 0.4);
            color: #ff9090;
        }

        .btn-delete:hover {
            background: rgba(150, 50, 50, 0.7);
            border-color: rgba(200, 100, 100, 0.7);
            color: #ffb0b0;
        }

        .empty-state {
            text-align: center;
            color: #666;
            padding: 30px 20px;
            font-size: 1em;
        }

        .no-members {
            grid-column: 1 / -1;
        }

        .penalty-input-group {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .penalty-input-group input {
            flex: 1;
            padding: 8px 10px;
            background: rgba(20, 30, 50, 0.8);
            border: 1px solid rgba(150, 150, 200, 0.4);
            border-radius: 6px;
            color: #e0e0e0;
            font-size: 0.9em;
        }

        .penalty-input-group button {
            padding: 8px 12px;
            background: rgba(100, 150, 200, 0.6);
            border: 1px solid rgba(150, 150, 200, 0.4);
            color: #e0e0e0;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8em;
            transition: all 0.2s ease;
        }

        .penalty-input-group button:hover {
            background: rgba(100, 150, 200, 0.9);
            border-color: rgba(150, 150, 200, 0.7);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>SOFLARE</h1>
            <p class="header-subtitle">Rule Breaker Tracker</p>
        </div>

        <!-- Form Section -->
        <div class="form-section">
            <div class="form-title">Add Member</div>
            <div class="form-group">
                <input 
                    type="text" 
                    id="memberName" 
                    class="input-field" 
                    placeholder="Member Name"
                >
                <input 
                    type="number" 
                    id="breakCount" 
                    class="input-field" 
                    placeholder="Rules Broken (1-4)" 
                    min="1" 
                    max="4"
                >
                <button class="btn" onclick="addMember()">Add</button>
            </div>
            <input 
                type="text" 
                id="rulesBroken" 
                class="input-field" 
                placeholder="Rules broken (e.g., Spam, Harassment) - separate with commas"
                style="grid-column: 1 / -1;"
            >
        </div>

        <!-- Members Display -->
        <div class="members-section">
            <div class="section-title">Members</div>
            <div class="members-grid" id="membersGrid">
                <div class="no-members empty-state">
                    No members yet. Add one to get started.
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize from localStorage
        let members = JSON.parse(localStorage.getItem('soflaremembers')) || [];
        const MAX_BREAKS = 4;

        function saveMembers() {
            localStorage.setItem('soflaremembers', JSON.stringify(members));
        }

        function getStatus(count, voteStatus) {
            if (voteStatus === 'mercy') return { level: 'mercy', text: 'At Our Mercy' };
            if (voteStatus === 'banned') return { level: 'banished', text: 'Banished' };
            
            if (count === 1) return { level: 'safe', text: 'Caution' };
            if (count === 2) return { level: 'warning', text: 'High Alert' };
            if (count === 3) return { level: 'danger', text: 'Critical' };
            if (count === MAX_BREAKS) return { level: 'voting', text: 'Awaiting Penalty' };
            return { level: 'safe', text: 'Safe' };
        }

        function getStrikeLevel(count, voteStatus) {
            if (voteStatus === 'mercy') return 'level-0';
            if (count === 1) return 'level-1';
            if (count === 2) return 'level-2';
            if (count === 3) return 'level-3';
            if (count === MAX_BREAKS) return 'level-4';
            return 'level-1';
        }

        function addMember() {
            const name = document.getElementById('memberName').value.trim();
            const count = parseInt(document.getElementById('breakCount').value) || 1;
            const rules = document.getElementById('rulesBroken').value.trim();

            if (!name) {
                alert('Please enter a member name');
                return;
            }

            const member = {
                id: Date.now(),
                name: name,
                breaks: Math.min(count, MAX_BREAKS),
                rules: rules ? rules.split(',').map(r => r.trim()) : [],
                penaltyType: null,
                banDays: null
            };

            members.push(member);
            saveMembers();
            render();
            document.getElementById('memberName').value = '';
            document.getElementById('breakCount').value = '';
            document.getElementById('rulesBroken').value = '';
        }

        function updateBreaks(id, newCount) {
            const member = members.find(m => m.id === id);
            if (member) {
                member.breaks = Math.max(1, Math.min(newCount, MAX_BREAKS));
                member.penaltyType = null;
                member.banDays = null;
                saveMembers();
                render();
            }
        }

        function setPenaltyType(id, type) {
            const member = members.find(m => m.id === id);
            if (member && member.breaks === MAX_BREAKS) {
                member.penaltyType = type;
                if (type === 'voting') {
                    member.banDays = null;
                }
                saveMembers();
                render();
            }
        }

        function setBanDays(id, days) {
            const member = members.find(m => m.id === id);
            if (member && member.penaltyType === 'kicked') {
                member.banDays = parseInt(days) || 7;
                saveMembers();
                render();
            }
        }

        function setMercy(id) {
            const member = members.find(m => m.id === id);
            if (member) {
                member.breaks = 0;
                member.penaltyType = 'mercy';
                member.banDays = null;
                saveMembers();
                render();
            }
        }

        function deleteMember(id) {
            members = members.filter(m => m.id !== id);
            saveMembers();
            render();
        }

        function render() {
            const grid = document.getElementById('membersGrid');

            if (members.length === 0) {
                grid.innerHTML = '<div class="no-members empty-state">No members yet. Add one to get started.</div>';
                return;
            }

            grid.innerHTML = members.map(member => {
                const status = getStatus(member.breaks, member.penaltyType);
                const strikeLevel = getStrikeLevel(member.breaks, member.penaltyType);
                let penaltySection = '';

                if (member.breaks === MAX_BREAKS && !member.penaltyType) {
                    penaltySection = `
                        <div class="penalty-toggle">
                            <button class="toggle-btn" onclick="setPenaltyType(${member.id}, 'voting')">Penalty (Voting)</button>
                            <button class="toggle-btn" onclick="setPenaltyType(${member.id}, 'kicked')">True Penalty</button>
                        </div>
                    `;
                } else if (member.penaltyType === 'voting') {
                    penaltySection = `
                        <div class="status voting">Penalty (Voting)</div>
                        <div class="penalty-toggle">
                            <button class="toggle-btn active">Penalty (Voting)</button>
                            <button class="toggle-btn" onclick="setPenaltyType(${member.id}, 'kicked')">Change to True Penalty</button>
                        </div>
                        <div class="card-actions" style="margin-top: 10px;">
                            <button class="btn-small" onclick="setMercy(${member.id})">At Our Mercy</button>
                        </div>
                    `;
                } else if (member.penaltyType === 'kicked') {
                    penaltySection = `
                        <div class="penalty-toggle">
                            <button class="toggle-btn" onclick="setPenaltyType(${member.id}, 'voting')">Change to Voting</button>
                            <button class="toggle-btn active">True Penalty</button>
                        </div>
                        <div class="penalty-input-group">
                            <input type="number" id="banDays-${member.id}" value="${member.banDays || 7}" min="1" placeholder="Ban days">
                            <button onclick="setBanDays(${member.id}, document.getElementById('banDays-${member.id}').value)">Set</button>
                        </div>
                        ${member.banDays ? `<div class="status banished">Death Penalty: ${member.banDays} Days</div>` : ''}
                    `;
                } else if (member.penaltyType === 'mercy') {
                    penaltySection = `<div class="status mercy">They're at Our Mercy</div>`;
                }

                return `
                    <div class="member-card">
                        <div class="member-name">${member.name}</div>
                        <div class="strike-display">
                            <span class="strike-count ${strikeLevel}">${member.breaks}</span>
                            <span class="strike-label">Rule${member.breaks !== 1 ? 's' : ''} Broken</span>
                        </div>
                        <div class="status ${status.level}">${status.text}</div>
                        ${member.rules.length > 0 ? `
                            <div class="rules-broken">
                                ${member.rules.map(rule => `<div class="rule-item">• ${rule}</div>`).join('')}
                            </div>
                        ` : ''}
                        ${penaltySection}
                        <div class="card-actions">
                            <button class="btn-small" onclick="updateBreaks(${member.id}, ${member.breaks - 1})" ${member.breaks === 1 ? 'disabled' : ''}>-</button>
                            <button class="btn-small" onclick="updateBreaks(${member.id}, ${member.breaks + 1})" ${member.breaks === MAX_BREAKS ? 'disabled' : ''}>+</button>
                            <button class="btn-small btn-delete" onclick="deleteMember(${member.id})">Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        render();
    </script>
</body>
</html>
